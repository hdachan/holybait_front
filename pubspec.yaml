name: holyhabit
description: A workout + RPG Flutter app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 네트워크
  dio: ^5.4.0

  # 상태관리
  provider: ^6.1.1

  # 보안 저장소
  flutter_secure_storage: ^9.0.0

  # Google 로그인
  google_sign_in: ^6.2.1

  # 라우팅
  go_router: ^13.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
